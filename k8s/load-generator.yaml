apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: workshop
  labels:
    app: load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
        - name: load-generator
          image: curlimages/curl:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Starting load generator - hitting frontend every 2s"
              while true; do
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://frontend.workshop.svc.cluster.local:3000/order)
                echo "$(date -Iseconds) GET /order -> $STATUS"
                sleep 2
              done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
