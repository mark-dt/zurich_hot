apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: workshop
  labels:
    app: inventory-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: workshop/inventory-service:latest
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: workshop
spec:
  selector:
    app: inventory-service
  ports:
    - port: 3003
      targetPort: 3003
  type: ClusterIP
