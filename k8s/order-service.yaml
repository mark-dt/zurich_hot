apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: workshop
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: workshop/order-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service.workshop.svc.cluster.local:3002"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service.workshop.svc.cluster.local:3003"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: workshop
spec:
  selector:
    app: order-service
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
