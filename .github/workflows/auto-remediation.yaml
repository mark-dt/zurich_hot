name: "Auto-Remediation: Disable Feature Flag"

# Triggered by Dynatrace workflow via GitHub API repository_dispatch
# Dynatrace sends: POST /repos/{owner}/{repo}/dispatches
#   { "event_type": "remediation", "client_payload": { "ff_key": "db_not_responding" } }

on:
  repository_dispatch:
    types: [remediation]

env:
  EASYTRADE_BASE_URL: ${{ secrets.EASYTRADE_BASE_URL }}
  DT_ENV_URL: ${{ secrets.DT_ENV_URL }}
  DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}

jobs:
  remediate:
    runs-on: ubuntu-latest
    steps:
      - name: Extract payload
        id: payload
        run: |
          FF_KEY="${{ github.event.client_payload.ff_key }}"
          if [ -z "$FF_KEY" ]; then
            echo "::error::No ff_key provided in client_payload"
            exit 1
          fi
          echo "ff_key=${FF_KEY}" >> "$GITHUB_OUTPUT"
          echo ">>> Remediating feature flag: ${FF_KEY}"

      - name: Disable feature flag (rollback)
        run: |
          FF_KEY="${{ steps.payload.outputs.ff_key }}"
          HTTP_STATUS=$(curl -sS -o /tmp/response.txt -w "%{http_code}" \
            -X PUT "${EASYTRADE_BASE_URL%/}/feature-flag-service/v1/flags/${FF_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"enabled": false}')
          echo "Response: $(cat /tmp/response.txt)"
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::error::Failed to disable feature flag ${FF_KEY}"
            exit 1
          fi
          echo ">>> Feature flag '${FF_KEY}' disabled successfully"

      - name: Send Dynatrace remediation event
        run: |
          FF_KEY="${{ steps.payload.outputs.ff_key }}"
          curl -sS -X POST "${DT_ENV_URL%/}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${DT_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"eventType\": \"CUSTOM_DEPLOYMENT\",
              \"title\": \"Auto-Remediation: disabled '${FF_KEY}'\",
              \"properties\": {
                \"dt.event.description\": \"Dynatrace auto-remediation triggered. Feature flag '${FF_KEY}' has been disabled to restore service health.\",
                \"dt.event.deployment.project\": \"easytrade\",
                \"dt.event.deployment.version\": \"remediation-${FF_KEY}-${{ github.run_number }}\",
                \"dt.event.deployment.release_stage\": \"production\",
                \"dt.event.deployment.ci_back_link\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
                \"remediation.trigger\": \"dynatrace-workflow\",
                \"featureFlag\": \"${FF_KEY}\",
                \"flagEnabled\": \"false\"
              }
            }"
