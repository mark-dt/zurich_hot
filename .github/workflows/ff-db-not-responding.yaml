name: "Release: DB Not Responding"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Enable or disable the problem pattern"
        required: true
        type: choice
        options:
          - enable
          - disable
  repository_dispatch:
    types: [remediate-db-not-responding]

env:
  EASYTRADE_BASE_URL: ${{ secrets.EASYTRADE_BASE_URL }}
  DT_ENV_URL: ${{ secrets.DT_ENV_URL }}
  DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}
  FF_KEY: db_not_responding
  FF_DISPLAY: "DB Not Responding"

jobs:
  toggle:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve action
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "action=disable" >> "$GITHUB_OUTPUT"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "version=remediation-db-not-responding-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "action=${{ inputs.action }}" >> "$GITHUB_OUTPUT"
            if [ "${{ inputs.action }}" = "enable" ]; then
              echo "enabled=true" >> "$GITHUB_OUTPUT"
              echo "version=release-db-not-responding-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            else
              echo "enabled=false" >> "$GITHUB_OUTPUT"
              echo "version=rollback-db-not-responding-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Toggle feature flag
        run: |
          HTTP_STATUS=$(curl -sS -o /tmp/response.txt -w "%{http_code}" \
            -X PUT "${EASYTRADE_BASE_URL%/}/feature-flag-service/v1/flags/${FF_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"enabled\": ${{ steps.resolve.outputs.enabled }}}")
          echo "Response: $(cat /tmp/response.txt)"
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::error::Feature flag toggle failed with status $HTTP_STATUS"
            exit 1
          fi

      - name: Send Dynatrace deployment event
        if: always()
        env:
          K8_CLUSTER: ${{ secrets.K8_CLUSTER }}
        run: |
          curl -sS -X POST "${DT_ENV_URL%/}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${DT_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "eventType": "CUSTOM_DEPLOYMENT",
            "title": "EasyTrade: ${FF_DISPLAY} ${{ steps.resolve.outputs.action }}d",
            "description": "Feature flag '${FF_KEY}' set to ${{ steps.resolve.outputs.enabled }}. Simulates database unavailability — prevents creation of new trades.",
            "entitySelector": "type(\"SERVICE\"),entityName.startsWith(\"login\"),tag(\"environment:${K8_CLUSTER}\")",
            "properties": {
              "git.repository": "${{ github.repository }}",
              "git.commit": "${{ github.sha }}",
              "deployment.url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "environment": "${K8_CLUSTER}",
              "featureFlag": "${FF_KEY}",
              "flagEnabled": "${{ steps.resolve.outputs.enabled }}"
            }
          }
          EOF
