name: Simulate Release (Feature Flag + Dynatrace Event)

on:
  workflow_dispatch:
    inputs:
      ff_key:
        description: "Feature flag key (example: db_not_responding)"
        required: true
        default: "db_not_responding"
      ff_enabled:
        description: "Enable flag: true|false"
        required: true
        default: "true"

jobs:
  simulate:
    runs-on: ubuntu-latest

    # Use GitHub secrets for sensitive values:
    # EASYTRADE_BASE_URL, DT_ENV_URL, DT_API_TOKEN
    env:
      EASYTRADE_BASE_URL: ${{ secrets.EASYTRADE_BASE_URL }}
      DT_ENV_URL: ${{ secrets.DT_ENV_URL }}
      DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}

      EASYTRADE_FF_KEY: ${{ inputs.ff_key }}
      EASYTRADE_FF_ENABLED: ${{ inputs.ff_enabled }}

      RELEASE_NAME: "EasyTrade simulated release"
      RELEASE_PROJECT: "easytrade"
      RELEASE_STAGE: "production"
      RELEASE_VERSION: ${{ github.sha }}

      CI_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      PR_LINK: ${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.pull_request.number }}

      # Optional: if you want to attach the event to specific entities, set selector as a secret or env
      # DT_ENTITY_SELECTOR: 'type("KUBERNETES_NAMESPACE"),entityName("easytrade")'

    steps:
      - name: Toggle EasyTrade feature flag (PUT)
        run: |
          curl -sS -X PUT "${EASYTRADE_BASE_URL%/}/feature-flag-service/v1/flags/${EASYTRADE_FF_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"enabled\": ${EASYTRADE_FF_ENABLED}}"
        # EasyTrade exposes feature-flag-service via /feature-flag-service [1](https://github.com/Dynatrace/easytrade/blob/main/README.md)
        # Example flag endpoint pattern /v1/flags/db_not_responding [3](https://deepwiki.com/gvorg/rh-dt-escape-room-101/6-remediation-workflows)

      - name: Push Dynatrace release/deployment event (POST)
        run: |
          # Build payload inline (no script)
          if [ -n "${DT_ENTITY_SELECTOR:-}" ]; then
            ENTITY_SELECTOR_LINE="\"entitySelector\": \"${DT_ENTITY_SELECTOR}\","
          else
            ENTITY_SELECTOR_LINE=""
          fi

          curl -sS -X POST "${DT_ENV_URL%/}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${DT_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              ${ENTITY_SELECTOR_LINE}
              \"eventType\": \"CUSTOM_DEPLOYMENT\",
              \"title\": \"${RELEASE_NAME}: ${RELEASE_VERSION}\",
              \"properties\": {
                \"dt.event.description\": \"Feature-flag release simulation. Flag '${EASYTRADE_FF_KEY}' set to ${EASYTRADE_FF_ENABLED}.\",
                \"dt.event.deployment.project\": \"${RELEASE_PROJECT}\",
                \"dt.event.deployment.version\": \"${RELEASE_VERSION}\",
                \"dt.event.deployment.release_stage\": \"${RELEASE_STAGE}\",
                \"ci.link\": \"${CI_LINK}\",
                \"pr.link\": \"${PR_LINK}\"
              }
            }"
        # Dynatrace Events API v2 ingest endpoint + CUSTOM_DEPLOYMENT event type [2](https://docs.dynatrace.com/docs/dynatrace-api/environment-api/events-v2/post-event)