name: Deploy Bad Release

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - deploy-bad-release
          - rollback
      failure_rate:
        description: "Failure rate (0.0-1.0), only used for deploy-bad-release"
        required: false
        default: "0.7"

env:
  DT_ENV_URL: ${{ secrets.DT_ENV_URL }}
  DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy bad release via SSH
        if: inputs.action == 'deploy-bad-release'
        run: |
          gcloud compute ssh ${{ secrets.VM_NAME }} \
            --zone=${{ secrets.VM_ZONE }} \
            --project=${{ secrets.GCP_PROJECT }} \
            --command='
              PODS=$(sudo KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl get pods -n workshop -l app=payment-service -o jsonpath='"'"'{.items[*].status.podIP}'"'"')
              for IP in $PODS; do
                echo "Setting failure rate on $IP..."
                wget -q -O- --post-data='"'"'{"rate":${{ inputs.failure_rate }}}'"'"' --header='"'"'Content-Type: application/json'"'"' "http://$IP:3002/admin/failure-rate"
                echo ""
              done
            '

      - name: Rollback via SSH
        if: inputs.action == 'rollback'
        run: |
          gcloud compute ssh ${{ secrets.VM_NAME }} \
            --zone=${{ secrets.VM_ZONE }} \
            --project=${{ secrets.GCP_PROJECT }} \
            --command='
              PODS=$(sudo KUBECONFIG=/etc/rancher/k3s/k3s.yaml kubectl get pods -n workshop -l app=payment-service -o jsonpath='"'"'{.items[*].status.podIP}'"'"')
              for IP in $PODS; do
                echo "Rolling back failure rate on $IP..."
                wget -q -O- --post-data='"'"'{"rate":0}'"'"' --header='"'"'Content-Type: application/json'"'"' "http://$IP:3002/admin/failure-rate"
                echo ""
              done
            '

      - name: Send Dynatrace deployment event
        if: always()
        run: |
          if [ "${{ inputs.action }}" = "deploy-bad-release" ]; then
            DESCRIPTION="Bad release deployed: payment-service FAILURE_RATE=${{ inputs.failure_rate }}"
            VERSION="bad-release-${{ github.run_number }}"
          else
            DESCRIPTION="Rollback: payment-service restored to healthy state"
            VERSION="rollback-${{ github.run_number }}"
          fi

          curl -sS -X POST "${DT_ENV_URL%/}/api/v2/events/ingest" \
            -H "Authorization: Api-Token ${DT_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"eventType\": \"CUSTOM_DEPLOYMENT\",
              \"title\": \"Workshop: ${DESCRIPTION}\",
              \"properties\": {
                \"dt.event.description\": \"${DESCRIPTION}\",
                \"dt.event.deployment.project\": \"workshop-demo\",
                \"dt.event.deployment.version\": \"${VERSION}\",
                \"dt.event.deployment.release_stage\": \"production\",
                \"ci.link\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }
            }"
