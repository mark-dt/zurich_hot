apiVersion: apps/v1
kind: Deployment
metadata:
  name: easytrade-logger
  namespace: easytrade
  labels:
    app: easytrade-logger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: easytrade-logger
  template:
    metadata:
      labels:
        app: easytrade-logger
      annotations:
        # Dynatrace security context for telemetry from this Pod
        metadata.dynatrace.com/dt.security_context: "easytrade"
    spec:
      containers:
      - name: logger
        image: busybox:1.36
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c"]
        args:
          - |
            while true; do
              echo "$(date -Iseconds) | ns=${POD_NAMESPACE} | pod=${POD_NAME} | node=${NODE_NAME} | msg=easytrade demo log line";
              sleep 5;
            done
        env:
          - name: POD_NAME
            valueFrom: { fieldRef: { fieldPath: metadata.name } }
          - name: POD_NAMESPACE
            valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
          - name: NODE_NAME
            valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true