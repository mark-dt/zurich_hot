apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-demo
  labels:
    app: prometheus-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-demo
  template:
    metadata:
      labels:
        app: prometheus-demo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: app
          image: quay.io/brancz/prometheus-example-app:v0.5.0
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-demo
  labels:
    app: prometheus-demo
spec:
  selector:
    app: prometheus-demo
  ports:
    - name: http
      port: 8080
      targetPort: 8080